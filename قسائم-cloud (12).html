      headers: { "X-Master-Key": JSONBIN_KEY }

  } catch(e) { return null; }

async function jbWrite(data) {
  try {
    if (!JSONBIN_BIN_ID) {
      // إنشاء bin جديد
      const r = await fetch(JSONBIN_BASE, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY,
          "X-Bin-Name": "qasaem-165-166-167",
          "X-Bin-Private": "true"

        body: JSON.stringify(data)
      });

      window.__binId = JSONBIN_BIN_ID;
      console.log("✅ Bin created:", JSONBIN_BIN_ID);
      return true;

      const r = await fetch(JSONBIN_BASE + "/" + JSONBIN_BIN_ID, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_KEY
        },
        body: JSON.stringify(data)
      });
      return r.ok;
    }
  } catch(e) {
    console.error("jbWrite error:", e);

<!-- حماية من فتح تبويبين -->
<script>
(function(){
  var bc;
  try { bc = new BroadcastChannel("eqalah_lock"); } catch(e) { return; }
  var myId = Math.random().toString(36).slice(2);
  var blocked = false;

  function block() {
    if (blocked) return;
    blocked = true;
    document.body.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#07090f;font-family:Cairo,sans-serif;text-align:center;padding:30px;">' +
      '<div style="font-size:64px;margin-bottom:20px;">⚠️</div>' +
      '<div style="font-size:22px;font-weight:900;color:#f87171;margin-bottom:12px;">التطبيق مفتوح في تبويب آخر</div>' +
      '<div style="font-size:14px;color:#94a3b8;margin-bottom:28px;line-height:2;">فتح التطبيق في أكثر من تبويب<br>قد يؤدي إلى فقدان البيانات<br><br>أغلق هذا التبويب أو التبويب الآخر</div>' +
      '<button onclick="location.reload()" style="background:#e8b84b;color:#07090f;border:3px solid #dc2626;border-radius:10px;padding:12px 32px;font-family:Cairo,sans-serif;font-size:15px;font-weight:900;cursor:pointer;">استخدم هذا التبويب</button>' +
      '</div>';
  }

  // أرسل ping — إذا رد أحد يعني يوجد تبويب آخر
  bc.postMessage({ t: "ping", id: myId });

  bc.onmessage = function(e) {
    if (e.data.t === "ping" && e.data.id !== myId) {
      // رد على التبويب الجديد
      bc.postMessage({ t: "pong", id: myId, to: e.data.id });
    }
    if (e.data.t === "pong" && e.data.to === myId) {
      // يوجد تبويب آخر نشط — نحجب هذا
      block();
    }
    if (e.data.t === "takeover" && e.data.id !== myId) {
      // تبويب آخر طالب الأولوية — نحجب هذا
      block();
    }
  };

  // إذا لم يرد أحد خلال 600ms — نحن الوحيدون
  setTimeout(function() {
    if (!blocked) {
      bc.postMessage({ t: "takeover", id: myId });
    }
  }, 600);

  window.addEventListener("beforeunload", function() {
    if (!blocked) bc.postMessage({ t: "release", id: myId });
  });
})();
</script>

<!-- زر الحفظ السحابي -->
<script>
(function(){
  var toastEl;
  function showToast(msg, color) {
    if(toastEl) toastEl.remove();
    toastEl = document.createElement("div");
    toastEl.innerHTML = msg;
    toastEl.style.cssText = "position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#111827;border:1px solid "+color+";color:"+color+";padding:10px 22px;border-radius:10px;font-family:Cairo,sans-serif;font-size:14px;font-weight:700;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;";
    document.body.appendChild(toastEl);
    setTimeout(function(){ if(toastEl){toastEl.remove();toastEl=null;} }, 4000);
  }

  // زر الحفظ اليدوي
  function doManualSave() {
    var state = window.__currentAppState;
    if (!state || !state.months || !state.months.length) {
      showToast("⚠️ سجّل دخولك أولاً", "#e8b84b");
      return;
    }
    var btn = document.getElementById("_save_btn");
    if(btn) { btn.disabled = true; btn.style.opacity = "0.6"; }
    var binId = localStorage.getItem("qasaem-bin-id") || "";
    var key = "$2a$10$gHryi1d02BgxfAPsM5MGkeka61UFAFBXvkXwBPtVfvMDdD4xl/Iuy";
    var base = "https://api.jsonbin.io/v3/b";

    console.log("🔵 doManualSave — binId:", binId ? binId : "none (creating new)");

    var url = binId ? (base + "/" + binId) : base;
    var method = binId ? "PUT" : "POST";
    var headers = { "Content-Type": "application/json", "X-Master-Key": key };
    if (!binId) {
      headers["X-Bin-Name"] = "qasaem-165-166-167";
      headers["X-Bin-Private"] = "true";
    }

    fetch(url, { method: method, headers: headers, body: JSON.stringify(state) })
      .then(function(r){
        console.log("🔵 Response status:", r.status);
        if (!r.ok) {
          return r.text().then(function(t){ throw new Error("HTTP " + r.status + ": " + t); });
        }
        return r.json();
      })
      .then(function(j){
        console.log("✅ JSONBin response:", JSON.stringify(j).slice(0,200));
        if (!binId && j.metadata && j.metadata.id) {
          var newId = j.metadata.id;
          localStorage.setItem("qasaem-bin-id", newId);
          window.__binId = newId;
          console.log("✅ Bin created, ID:", newId);
        }
        var now = new Date();
        var t = String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
        var el = document.getElementById("_save_time");
        if(el){ el.textContent = "آخر حفظ: "+t; el.style.color="#4ade80"; }
        showToast("✅ تم الحفظ في السحابة", "#4ade80");
      })
      .catch(function(e){
        console.error("❌ Save error:", e.message);
        showToast("❌ " + e.message, "#f87171");
      })
      .finally(function(){
        if(btn){ btn.disabled=false; btn.style.opacity="1"; }
      });
  }

  window.addEventListener("load", function(){
    var btn = document.createElement("button");
    btn.id = "_save_btn";
    btn.innerHTML = '☁️ <b>حفظ</b> <span id="_save_time" style="font-size:10px;color:#333;font-weight:400;">لم يتم بعد</span>';
    btn.style.cssText = "position:fixed;top:8px;right:320px;background:#e8b84b;color:#07090f;border:3px solid #dc2626;border-radius:10px;padding:7px 18px;font-family:Cairo,sans-serif;font-size:14px;font-weight:900;cursor:pointer;z-index:99999;box-shadow:0 2px 10px rgba(232,184,75,.4);white-space:nowrap;display:none;align-items:center;gap:6px;";
    btn.onclick = doManualSave;
    document.body.appendChild(btn);

    // زر التصدير
    var expBtn = document.createElement('button');
    expBtn.id = '_export_btn';
    expBtn.innerHTML = '💾 <b>نسخة احتياطية</b>';
    expBtn.style.cssText = 'position:fixed;top:8px;right:500px;background:#1e3a5f;color:#60a5fa;border:2px solid #1e40af;border-radius:10px;padding:7px 16px;font-family:Cairo,sans-serif;font-size:13px;font-weight:900;cursor:pointer;z-index:99999;white-space:nowrap;display:none;align-items:center;gap:6px;';
    expBtn.onclick = function() {
      var state = window.__currentAppState;
      if (!state) { alert('سجّل دخولك أولاً'); return; }
      var now = new Date();
      var dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      var blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'qasaem-backup-' + dateStr + '.json';
      a.click();
    };
    document.body.appendChild(expBtn);
  });

  window.addEventListener("beforeunload", function(e){ e.preventDefault(); e.returnValue="هل حفظت التعديلات؟"; });
})();
</script>
</body>
</html>
